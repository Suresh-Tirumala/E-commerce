# ===================================================================
# NexusCart E-Commerce Application Configuration
# ===================================================================

# ------------------- Server Configuration -------------------
server.port=8080
server.servlet.context-path=/api/v1
server.compression.enabled=true
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=10

# ------------------- Database Configuration (MySQL) -------------------
spring.datasource.url=jdbc:mysql://localhost:3306/nexuscart?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:nexuscart_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Connection Pool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=false

# JPA & Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.generate_statistics=false
spring.jpa.open-in-view=false

# Flyway Migration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# ------------------- Redis Configuration -------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=0
spring.data.redis.timeout=3000ms
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000

# ------------------- Security & JWT Configuration -------------------
app.jwt.secret=${JWT_SECRET:your-256-bit-secret-key-change-in-production-minimum-32-chars-long-enough-for-security}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
nexuscart.security.password-strength=12

# ------------------- File Upload Configuration -------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
nexuscart.upload.directory=${UPLOAD_DIR:/tmp/nexuscart/uploads}

# ------------------- Logging Configuration -------------------
logging.level.root=INFO
logging.level.com.nexuscart=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/nexuscart.log
logging.file.max-size=10MB
logging.file.max-history=30

# ------------------- Actuator Configuration -------------------
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
management.metrics.tags.application=nexuscart-backend

# ------------------- OpenAPI/Swagger Configuration -------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.api-docs.enabled=true

# ------------------- Application Info -------------------
spring.application.name=nexuscart-backend
info.app.name=NexusCart E-Commerce Platform
info.app.description=Production-level e-commerce backend system
info.app.version=1.0.0-SNAPSHOT
info.app.java-version=21

# ------------------- Payment Gateway Configuration (Placeholder) -------------------
nexuscart.payment.stripe.api-key=${STRIPE_API_KEY:}
nexuscart.payment.paypal.client-id=${PAYPAL_CLIENT_ID:}
nexuscart.payment.paypal.secret=${PAYPAL_SECRET:}

# ------------------- Email Configuration (Placeholder) -------------------
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
